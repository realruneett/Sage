name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy bandit pytest pytest-cov numpy gudhi faiss-cpu radon hypothesis loguru pydantic langgraph
    - name: Lint with ruff
      run: ruff check .
    - name: Type check with mypy
      run: mypy --strict sage/
    - name: Security scan with bandit
      run: bandit -r sage/
    - name: Run unit tests
      run: pytest sage/tests
