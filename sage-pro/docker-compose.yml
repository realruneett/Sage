services:
  sage-pro:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: sage-pro:latest
    container_name: sage-pro
    shm_size: '16gb'
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    environment:
      - PYTHONPATH=/usr/local/lib/python3.10/site-packages:/app
    volumes:
      - ./.env:/app/.env
      - ./models:/app/models
      - ./demo_output:/app/demo_output
      - ./logs:/app/logs
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "8001-8005:8001-8005"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  sage-ui:
    image: sage-pro:latest
    container_name: sage-ui
    depends_on:
      - sage-pro
    environment:
      - PYTHONPATH=/usr/local/lib/python3.10/site-packages:/app
    ports:
      - "7860:7860"
    entrypoint: ["python3", "-m", "sage.ui.dashboard"]
    restart: unless-stopped
