name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Changelog
      run: echo "Release $(git describe --tags)" > CHANGELOG.md
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          CHANGELOG.md
          requirements.txt
