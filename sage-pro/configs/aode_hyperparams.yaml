# AODE Reasoning Hyperparameters
epsilon: 0.05
delta: 0.02
max_cycles: 4
alpha_divergence_threshold: 0.15

damage_weights:
  ruff: 0.1
  mypy: 0.2
  bandit: 0.5
  semgrep: 0.4
  tests: 1.0
  complexity: 0.05

# Router Config
embedding_model: "BAAI/bge-small-en-v1.5"
index_dims: 384
routing_max_neighbors: 5
routing_search_cap: 500

# API Server Config
server_host: "0.0.0.0"
server_port: 8000
vllm_hosts:
  architect: "http://localhost:8001/v1"
  implementer: "http://localhost:8002/v1"
  synthesizer: "http://localhost:8003/v1"
  redteam: "http://localhost:8004/v1"

# API Communication Limits
api_timeout_sec: 300.0
api_max_retries: 3

# Agent Configurations
agents:
  architect:
    model_name: "qwen2.5:72b"
    prompt_path: "sage/prompts/architect.md"
    temperature: 0.3
  implementer:
    model_name: "qwen2.5-coder:32b"
    prompt_path: "sage/prompts/implementer.md"
    temperature: 0.1
  synthesizer:
    model_name: "deepseek-coder-v2:16b"
    prompt_path: "sage/prompts/synthesizer.md"
    temperature: 0.0
  redteam:
    primary_model: "starcoder2:15b"
    primary_temperature: 0.7
    secondary_model: "starcoder2:15b"
    secondary_temperature: 0.5
    prompt_path: "sage/prompts/red_team.md"

# VRAM Estimation
vram_base_gb: 89.0
vram_per_cycle_gb: 2.5

# SAGE-PRO v2 Architecture Settings

# Penalty System
penalty:
  alpha_hard: 0.25
  alpha_soft: 0.08
  w_floor: 0.10
  epsilon_boost: 0.30
  epsilon_max: 0.90
  epsilon_decay: 0.97

# CTR & MAQR Engine
ctr_maqr:
  q_learning:
    alpha: 0.15
    gamma: 0.92
    epsilon_start: 0.25
    epsilon_end: 0.04
  reward_weights:
    correctness: 0.40
    security: 0.30
    efficiency: 0.20
    novelty: 0.10
  centroid_drift:
    high_reward_threshold: 0.75
    low_reward_threshold: 0.35
    attract_rate: 0.08
    repel_rate: 0.04
  crystallisation_consecutive_steps: 5
  evaporation:
    idle_steps_threshold: 500
    decay_rate: 0.98
    prune_threshold: 0.01

# Correction Detection
correction_patterns:
  - "(that'?s?\\s+(wrong|incorrect|not right|inaccurate|false))"
  - "(no[,.]\\s*(actually|that'?s|you'?re|you are))"
  - "(you'?re?\\s+(wrong|incorrect|mistaken|off))"
  - "(actually[,]?\\s+it'?s?\\s)"
  - "(the\\s+(correct|right|actual)\\s+(answer|solution|way|code)\\s+is)"
  - "(that\\s+doesn'?t\\s+(work|compile|run|make sense|execute))"
  - "(you\\s+made\\s+a\\s+mistake)"
  - "(please\\s+correct\\s+(that|this|it))"
  - "(wrong\\s+output)"
  - "(that\\s+(is|was)\\s+(completely\\s+)?(wrong|broken|incorrect))"
  - "(fix\\s+your\\s+(answer|response|code|mistake))"
  - "(try\\s+again[,.]?\\s+(that|it|this)\\s+is\\s+wrong)"

